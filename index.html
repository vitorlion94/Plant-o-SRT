<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <h1>Teste de Conexão com Supabase</h1>
  <button id="btnTest">Testar SELECT</button>
  <button id="btnInsert">Testar INSERT</button>
  <pre id="output"></pre>

  <script>
    // Cole suas credenciais aqui
    const SUPABASE_URL = "https://kuhbvcrvmaubtnkemkjr.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1aGJ2Y3J2bWF1YnRua2Vta2pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzY3NjEsImV4cCI6MjA5ODAxMjc2MX0.xm8vRFgB9yzYmRZPvBatkdlZPyEy97MP00ppzmlFwoM";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const output = document.getElementById("output");

    document.getElementById("btnTest").addEventListener("click", async () => {
      const { data, error } = await supabase.from("evolucoes").select("*").limit(5);
      if (error) {
        output.textContent = "Erro SELECT: " + JSON.stringify(error, null, 2);
      } else {
        output.textContent = "Dados SELECT:\n" + JSON.stringify(data, null, 2);
      }
    });

    document.getElementById("btnInsert").addEventListener("click", async () => {
      const payload = {
        patient_id: 99,
        tecnico: "Teste",
        sinais_vitais: {paS:120, paD:80},
        estado_psiquico: {humor:"Estável"},
        medicacao: {obs:"Teste"},
        higiene: {banho:"Autônomo"},
        agenda: {proximas:"Consulta teste"},
        texto_anotacao: "Anotação de teste"
      };
      const { error } = await supabase.from("evolucoes").insert([payload]);
      if (error) {
        output.textContent = "Erro INSERT: " + JSON.stringify(error, null, 2);
      } else {
        output.textContent = "INSERT realizado com sucesso!";
      }
    });
  </script>
</body>
</html>
